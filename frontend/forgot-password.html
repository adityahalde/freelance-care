<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Urban Edge</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Forgot Password</h1>
      <p class="subtitle">Enter your email and we’ll prepare a reset link.</p>
      <div id="alert-box"></div>
      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="forgot-btn">Send reset link</button>
      </form>
      <p class="form-footer"><a href="/login.html">Back to login</a></p>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/cart.js"></script>
  <script src="/static/js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      setPageTitle("forgot-password");
      renderHeader();

      document.getElementById("forgot-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("forgot-btn");
        setLoading(btn, true, "Send reset link");
        try {
          const data = await apiRequest("/api/auth/forgot-password", {
            method: "POST",
            body: { email: document.getElementById("email").value.trim() },
          });
          showAlert("alert-box", data.message || "If an account exists, a reset link has been prepared.", "success");
        } catch (err) {
          showAlert("alert-box", err.message);
        } finally {
          setLoading(btn, false, "Send reset link");
        }
      });
    });
  </script>
</body>
</html>
