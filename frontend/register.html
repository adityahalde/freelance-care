<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Urban Edge</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="subtitle">Join Urban Edge — India's premium streetwear</p>
      <div id="alert-box"></div>
      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required autocomplete="name" minlength="2">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="8" autocomplete="new-password">
          <p class="form-hint">Min 8 characters with at least one letter and one number</p>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="register-btn">Create Account</button>
      </form>
      <p class="form-footer">Already have an account? <a href="/login.html">Login</a></p>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/cart.js"></script>
  <script src="/static/js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      setPageTitle("register");
      renderHeader();
      const existing = getUser();
      if (existing) {
        window.location.href = existing.role === "admin" ? "/admin/dashboard.html" : "/";
        return;
      }

      document.getElementById("register-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("register-btn");
        setLoading(btn, true, "Create Account");
        try {
          const data = await apiRequest("/api/auth/register", {
            method: "POST",
            body: {
              name: document.getElementById("name").value.trim(),
              email: document.getElementById("email").value.trim(),
              password: document.getElementById("password").value,
            },
          });
          setAuth(data.token, data.user);
          window.location.href = "/";
        } catch (err) {
          showAlert("alert-box", err.message);
        } finally {
          setLoading(btn, false, "Create Account");
        }
      });
    });
  </script>
</body>
</html>
