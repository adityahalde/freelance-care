<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Urban Edge</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your Urban Edge account</p>
      <div id="alert-box"></div>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">Login</button>
      </form>
      <p class="form-footer">New here? <a href="/register.html">Create an account</a></p>
      <p class="form-footer"><a href="/forgot-password.html">Forgot password?</a></p>
      <p class="form-footer"><a href="/admin/login.html">Admin login</a></p>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/cart.js"></script>
  <script src="/static/js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      setPageTitle("login");
      renderHeader();

      const existing = getUser();
      if (existing) {
        if (existing.role === "admin") {
          window.location.href = "/admin/dashboard.html";
        } else {
          const redirect = new URLSearchParams(window.location.search).get("redirect") || "/";
          window.location.href = redirect;
        }
        return;
      }

      document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("login-btn");
        setLoading(btn, true, "Login");
        try {
          const data = await apiRequest("/api/auth/login", {
            method: "POST",
            body: {
              email: document.getElementById("email").value.trim(),
              password: document.getElementById("password").value,
            },
          });
          if (data.user.role === "admin") {
            showAlert("alert-box", "Administrator accounts must use the Admin Login page.");
            return;
          }
          setAuth(data.token, data.user);
          const redirect = new URLSearchParams(window.location.search).get("redirect");
          window.location.href = redirect || "/";
        } catch (err) {
          showAlert("alert-box", err.message);
        } finally {
          setLoading(btn, false, "Login");
        }
      });
    });
  </script>
</body>
</html>
