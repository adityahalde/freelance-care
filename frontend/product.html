<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Urban Edge</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="container" id="product-container">
    <p style="padding:4rem;text-align:center;color:#9a9a9a">Loading product...</p>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/cart.js"></script>
  <script src="/static/js/main.js"></script>
  <script>
    let quantity = 1;
    let currentProduct = null;

    async function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      if (!id) {
        window.location.href = "/products.html";
        return;
      }

      try {
        const data = await apiRequest(`/api/products/${id}`);
        currentProduct = data.product;
        document.title = `${currentProduct.name} — Urban Edge`;

        document.getElementById("product-container").innerHTML = `
          <p class="breadcrumb" style="padding-top:2rem">
            <a href="/">Home</a> / <a href="/products.html">Shop</a> / ${escapeHtml(currentProduct.name)}
          </p>
          <div class="product-detail">
            <div class="product-detail-gallery">
              <img src="${escapeHtml(currentProduct.image)}" alt="${escapeHtml(currentProduct.name)}" class="product-detail-image">
            </div>
            <div class="product-detail-info">
              <p class="product-detail-category">${escapeHtml(currentProduct.category)}</p>
              <h1>${escapeHtml(currentProduct.name)}</h1>
              <p class="product-detail-price">${formatPrice(currentProduct.price)}</p>
              <p class="product-detail-desc">${escapeHtml(currentProduct.description)}</p>
              <p class="form-hint">Inclusive of GST · Free shipping on orders above ₹999</p>
              <div class="quantity-control">
                <button type="button" id="qty-minus" aria-label="Decrease quantity">−</button>
                <span id="qty-value">1</span>
                <button type="button" id="qty-plus" aria-label="Increase quantity">+</button>
              </div>
              <div class="detail-actions">
                <button type="button" class="btn btn-primary btn-lg" id="add-to-cart-btn">Add to Cart</button>
                <a href="/cart.html" class="btn btn-outline btn-lg">View Cart</a>
              </div>
            </div>
          </div>
        `;

        document.getElementById("qty-minus").addEventListener("click", () => {
          if (quantity > 1) {
            quantity--;
            document.getElementById("qty-value").textContent = quantity;
          }
        });
        document.getElementById("qty-plus").addEventListener("click", () => {
          if (quantity < 20) {
            quantity++;
            document.getElementById("qty-value").textContent = quantity;
          }
        });
        document.getElementById("add-to-cart-btn").addEventListener("click", (e) => {
          e.preventDefault();
          addToCart(currentProduct, quantity);
          const btn = document.getElementById("add-to-cart-btn");
          btn.textContent = "Added to Cart ✓";
          setTimeout(() => { btn.textContent = "Add to Cart"; }, 2000);
        });
      } catch (err) {
        document.getElementById("product-container").innerHTML = `
          <div class="empty-state">
            <h2>Product not found</h2>
            <p>This item may have been removed.</p>
            <a href="/products.html" class="btn btn-primary">Back to Shop</a>
          </div>`;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderHeader("products");
      loadProduct();
    });
  </script>
</body>
</html>
