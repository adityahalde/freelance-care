<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Urban Edge</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Reset Password</h1>
      <p class="subtitle">Choose a new password for your account.</p>
      <div id="alert-box"></div>
      <form id="reset-form" novalidate>
        <div class="form-group">
          <label for="password">New password</label>
          <input type="password" id="password" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="reset-btn">Update password</button>
      </form>
      <p class="form-footer"><a href="/login.html">Back to login</a></p>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/cart.js"></script>
  <script src="/static/js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      setPageTitle("reset-password");
      renderHeader();

      const params = new URLSearchParams(window.location.search);
      const token = params.get("token") || "";

      if (!token) {
        showAlert("alert-box", "Missing reset token.");
      }

      document.getElementById("reset-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("reset-btn");
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm-password").value;

        if (password.length < 8) {
          showAlert("alert-box", "Password must be at least 8 characters long.");
          return;
        }

        if (password !== confirmPassword) {
          showAlert("alert-box", "Passwords do not match.");
          return;
        }

        setLoading(btn, true, "Update password");
        try {
          const data = await apiRequest("/api/auth/reset-password", {
            method: "POST",
            body: { token, password },
          });
          showAlert("alert-box", data.message || "Password updated successfully.", "success");
          document.getElementById("reset-form").reset();
        } catch (err) {
          showAlert("alert-box", err.message);
        } finally {
          setLoading(btn, false, "Update password");
        }
      });
    });
  </script>
</body>
</html>
